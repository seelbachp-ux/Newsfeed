name: Daily Digest

on:
  # 05:00 UTC ≈ 07:00 Berlin in summer (06:00 UTC ≈ 07:00 in winter).
  # GitHub cron is always UTC and has no timezone — adjust if you like.
  # Note: scheduled runs can be delayed a few minutes under load, and GitHub
  # pauses the schedule after 60 days with no commits to the repo.
  schedule:
    - cron: "0 5 * * 1-5"   # Mon–Fri
  workflow_dispatch:          # adds a "Run workflow" button for manual testing

# Needed so the job can commit the new episode + feed back to the repo.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Install audio tools (ffmpeg + Piper TTS)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install piper-tts

      - name: Download Piper voice model
        run: |
          mkdir -p voice
          base=https://huggingface.co/rhasspy/piper-voices/resolve/main/en/en_US/lessac/medium
          curl -sL -o voice/en_US-lessac-medium.onnx       "$base/en_US-lessac-medium.onnx"
          curl -sL -o voice/en_US-lessac-medium.onnx.json  "$base/en_US-lessac-medium.onnx.json"

      - name: Build digest, send Telegram, render podcast
        run: python run_cloud.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PIPER_MODEL: voice/en_US-lessac-medium.onnx
          FEED_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Commit episode + feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Episode $(date +%F)" || echo "nothing to commit"
          git push
